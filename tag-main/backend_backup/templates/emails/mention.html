<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>You were mentioned!</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 5px; }
        .header { background-color: #0ea5e9; color: white; padding: 10px; text-align: center; border-radius: 5px 5px 0 0; }
        .content { padding: 20px; }
        .quote { background-color: #f9f9f9; border-left: 4px solid #0ea5e9; padding: 10px; font-style: italic; margin: 15px 0; }
        .button { display: inline-block; background-color: #0ea5e9; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; margin-top: 20px; }
        .footer { text-align: center; font-size: 12px; color: #777; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>You Have a New Mention</h2>
        </div>
        <div class="content">
            <p>Hi {{name}},</p>
            <p><strong>{{mentioner_name}}</strong> mentioned you in the thread: <strong>{{thread_title}}</strong></p>
            
            <div class="quote">
                "{{mention_snippet}}"
            </div>

            <p style="text-align: center;">
                <a href="{{context_link}}" class="button">View Discussion</a>
            </p>
        </div>
        <div class="footer">
            <p>&copy; 2026 The Aqua Guide. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
