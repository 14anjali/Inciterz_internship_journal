<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>New Direct Message</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 5px; }
        .header { background-color: #8b5cf6; color: white; padding: 10px; text-align: center; border-radius: 5px 5px 0 0; }
        .content { padding: 20px; }
        .message-preview { background-color: #f3f4f6; padding: 15px; border-radius: 8px; margin: 15px 0; font-style: italic; color: #555; }
        .button { display: inline-block; background-color: #8b5cf6; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; margin-top: 20px; }
        .footer { text-align: center; font-size: 12px; color: #777; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>New Message from {{sender_name}}</h2>
        </div>
        <div class="content">
            <p>Hi {{name}},</p>
            <p>You have a new private message from <strong>{{sender_name}}</strong>:</p>
            
            <div class="message-preview">
                "{{message_snippet}}..."
            </div>

            <p style="text-align: center;">
                <a href="{{chat_link}}" class="button">Reply Now</a>
            </p>
        </div>
        <div class="footer">
            <p>&copy; 2026 The Aqua Guide. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
