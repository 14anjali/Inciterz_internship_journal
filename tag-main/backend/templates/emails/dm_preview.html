<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>New Direct Message</title>
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; line-height: 1.6; color: #1f2937; background-color: #f9f9f9; }
        .container { max-width: 600px; margin: 24px auto; background-color: #ffffff; border: 1px solid #e5e7eb; border-radius: 10px; overflow: hidden; }
        .header { background-color: #0ea5e9; color: #ffffff; padding: 20px; text-align: center; }
        .header h2 { margin: 0; font-size: 22px; }
        .content { padding: 24px; }
        .content p { margin: 0 0 14px; }
        a { color: #0ea5e9; }
        .message-preview { background-color: #f3f4f6; padding: 15px; border-radius: 8px; margin: 15px 0; font-style: italic; color: #374151; }
        .button { display: inline-block; background-color: #0ea5e9; color: #ffffff !important; padding: 12px 22px; text-decoration: none; border-radius: 6px; font-weight: 600; }
        .signature { margin-top: 18px; }
        .signature p { margin: 0; }
        .signature-name { font-weight: 700; }
        .footer { text-align: center; font-size: 12px; color: #6b7280; padding: 16px 20px; background-color: #f3f4f6; border-top: 1px solid #e5e7eb; }
        .footer p { margin: 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>New Message from {{sender_name}}</h2>
        </div>
        <div class="content">
            <p>Hi {{name}},</p>
            <p>You have a new private message from <strong>{{sender_name}}</strong>:</p>
            
            <div class="message-preview">
                "{{message_snippet}}..."
            </div>

            <p style="text-align: center;">
                <a href="{{chat_link}}" class="button">Reply Now</a>
            </p>
            <div class="signature">
                <p>Thanks,</p>
                <p class="signature-name">The Aqua Guide Team</p>
            </div>
        </div>
        <div class="footer">
            <p>&copy; 2026 The Aqua Guide. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
